name: Generate Article

on:
  schedule:
    # Runs every 30 minutes (= 48/day, safely under Gemini free tier's
    # 1500 requests/day and 15 requests/minute limits).
    # Cron format: minute hour day month weekday (all UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_article.py

      - name: Commit and push new article
        run: |
          git config user.name "article-bot"
          git config user.email "article-bot@users.noreply.github.com"
          git add articles/ data/
          git commit -m "Add new article [automated]" || echo "Nothing to commit"
          git push
