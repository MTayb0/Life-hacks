<!DOCTYPE html>
<html lang="en">
<head>

  <title>Daily Solutions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Daily Solutions</h1>

  <main>

      <button class="filter-btn" data-cat="trending">🔥 Trending</button>

      <li>Loading articles...</li>
    </ul>

  <footer>
    <p>&copy; 2026 Daily Solutions</p>
  </footer>

  <script src="script.js"></script>

</html>
